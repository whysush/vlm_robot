# slam_toolbox online-async mapping.
# Frames match the URDF: base_footprint is the robot base, odom from DiffDrive,
# map produced by SLAM. Tuned light for CPU-only operation.
slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # ---- frames / topics ----
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    # publish map->odom; this is the transform AMCL would otherwise provide
    transform_publish_period: 0.05   # 20 Hz map->odom
    map_update_interval: 2.0         # rebuild occupancy grid every 2s (cheap)

    # ---- mode ----
    mode: mapping                    # building a new map (vs localization)
    # solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ---- scan matching / resolution ----
    resolution: 0.05                 # 5cm grid
    max_laser_range: 12.0            # matches lidar <max>
    minimum_time_interval: 0.5       # throttle: process a scan at most every 0.5s
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000

    # only add a node to the graph after this much motion (keeps graph small)
    minimum_travel_distance: 0.3
    minimum_travel_heading: 0.3      # radians

    # scan buffer
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 12.0

    # ---- loop closure (keep on, modest params) ----
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    loop_match_minimum_chain_size: 8
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # correlation search windows (defaults are fine for a 5cm map)
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # debug
    debug_logging: false
    throttle_scans: 1
    enable_interactive_mode: true
